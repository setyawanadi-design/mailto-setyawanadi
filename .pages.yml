media:
  input: public/media
  output: /media

content:
  - name: inbox
    label: Inbox
    type: collection
    path: src/content/inbox
    format: yaml-frontmatter
    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: from, label: From, type: string, required: true }
      - { name: fromEmail, label: From Email, type: string, required: true }
      - { name: date, label: Date, type: date, required: true }
      - { name: preview, label: Preview, type: text, required: true }
      - { name: pinned, label: Pinned, type: boolean }
      - name: attachments
        label: Attachments
        type: object
        list: true
        fields:
          - { name: name, label: Name, type: string }
          - { name: url, label: URL, type: string }
          - { name: size, label: Size, type: string }
    view:
      fields: [title, date]
      primary: title
      sort: [date]

  - name: sent
