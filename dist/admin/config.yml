backend:
  name: github
  repo: setyawanadi-design/mailto-setyawanadi
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: posts
    label: Posts
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - label: Category
        name: category
        widget: select
        options:
          - { label: Inbox, value: inbox }
          - { label: Sent, value: sent }
          - { label: Drafts, value: drafts }
          - { label: Notes, value: notes }
          - { label: Archive, value: archive }
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Pinned, name: pinned, widget: boolean, default: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - label: Attachments
        name: attachments
        widget: list
        required: false
        fields:
          - { label: Name, name: name, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Size, name: size, widget: string }
      - { label: Body, name: body, widget: markdown }

  - name: logs
    label: Logs
    folder: src/content/logs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string, required: false }
      - { label: Date, name: date, widget: datetime }
      - { label: Body, name: body, widget: markdown }
