backend:
  name: github
  repo: setyawanadi-design/mailto-setyawanadi
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: inbox
    label: Inbox
    folder: src/content/inbox
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: From, name: from, widget: string, default: "setyawanadi" }
      - { label: From Email, name: fromEmail, widget: string, default: "setyawanadi@hotmail.com" }
      - { label: Date, name: date, widget: datetime }
      - { label: Preview, name: preview, widget: string }
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Pinned, name: pinned, widget: boolean, default: false }
      - label: Attachments
        name: attachments
        widget: list
        required: false
        fields:
          - { label: Name, name: name, widget: string }
          - { label: URL, name: url, widget: string }
          - { label: Size, name: size, widget: string }
      - { label: Body, name: body, widget: markdown }

